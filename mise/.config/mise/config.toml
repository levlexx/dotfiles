[tools]
node = "24.18.0"
go = "1.26.4"
"npm:@biomejs/biome" = "2.5.0"
"npm:prettier" = "3.8.4"
"npm:@vtsls/language-server" = "0.3.0"
"npm:@angular/language-server" = "22.0.4"
"npm:@typespec/compiler" = "1.13.0"
"npm:tree-sitter-cli" = "0.26.9"
"npm:vscode-langservers-extracted" = "4.10.0"
"npm:yaml-language-server" = "1.23.0"
"npm:dockerfile-language-server-nodejs" = "0.15.0"
"npm:@microsoft/compose-language-service" = "0.5.0"
"aqua:LuaLS/lua-language-server" = "3.18.2"
"aqua:JohnnyMorganz/StyLua" = "2.5.2"
"aqua:k3d-io/k3d" = "5.9.0"
"aqua:kubernetes/kubectl" = "1.36.2"
"aqua:derailed/k9s" = "0.51.0"
"aqua:helm/helm" = "3.21.2"
"aqua:kubernetes-sigs/kustomize" = "5.8.1"
"aqua:jesseduffield/lazydocker" = "0.25.2"
"aqua:jesseduffield/lazygit" = "0.62.2"
"aqua:tilt-dev/tilt" = "0.37.4"

[env]
GOBIN = "{{env.HOME}}/go/bin"
JS_DEBUG_ADAPTER = "{{env.HOME}}/.local/share/vscode-js-debug/dist/src/dapDebugServer.js"

[tasks.install-go-tools]
description = "Install Go developer tools with the mise-managed Go runtime"
run = '''
set -eu

export GOBIN="$HOME/go/bin"
mkdir -p "$GOBIN"

echo "go: $(command -v go)"
go version
echo "GOBIN: $GOBIN"

go install golang.org/x/tools/gopls@latest
go install golang.org/x/tools/cmd/goimports@latest
go install mvdan.cc/gofumpt@latest
go install honnef.co/go/tools/cmd/staticcheck@latest
go install github.com/go-delve/delve/cmd/dlv@latest
go install golang.org/x/vuln/cmd/govulncheck@latest

# Keep golangci-lint under the same mise-managed Go toolchain instead of using
# Homebrew or a curl installer.
go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
'''

[tasks.install-js-debug-adapter]
description = "Install Microsoft's JavaScript debug adapter with the mise-managed Node runtime"
run = '''
set -eu

target="${JS_DEBUG_DIR:-$HOME/.local/share/vscode-js-debug}"
repo="https://github.com/microsoft/vscode-js-debug.git"

mkdir -p "$(dirname "$target")"

if [ -d "$target/.git" ]; then
  git -C "$target" pull --ff-only
else
  rm -rf "$target"
  git clone --depth 1 "$repo" "$target"
fi

cd "$target"
npm ci --ignore-scripts
npx gulp dapDebugServer

test -f "$target/dist/src/dapDebugServer.js"
printf 'JS debug adapter: %s\n' "$target/dist/src/dapDebugServer.js"
'''

[tasks.doctor]
description = "Print runtime, Go tool, and editor tool versions"
run = '''
set -u

show_path() {
  name="$1"
  printf '%s path: ' "$name"
  if command -v "$name" >/dev/null 2>&1; then
    command -v "$name"
  else
    echo 'MISSING'
  fi
}

section() {
  printf '\n== %s ==\n' "$1"
}

section go
show_path go
printf 'GOBIN: %s\n' "${GOBIN:-unset}"
if command -v go >/dev/null 2>&1; then
  go version
fi

section gopls
show_path gopls
if command -v gopls >/dev/null 2>&1; then
  gopls version
fi

section gofumpt
show_path gofumpt
if command -v gofumpt >/dev/null 2>&1; then
  gofumpt -version 2>/dev/null || gofumpt --version
fi

section goimports
show_path goimports
if command -v goimports >/dev/null 2>&1; then
  go version -m "$(command -v goimports)" | sed -n '1,20p'
fi

section staticcheck
show_path staticcheck
if command -v staticcheck >/dev/null 2>&1; then
  staticcheck -version
fi

section dlv
show_path dlv
if command -v dlv >/dev/null 2>&1; then
  dlv version
fi

section govulncheck
show_path govulncheck
if command -v govulncheck >/dev/null 2>&1; then
  govulncheck -version
fi

section golangci-lint
show_path golangci-lint
if command -v golangci-lint >/dev/null 2>&1; then
  golangci-lint version
fi

section editor-tools
for tool in \
  biome \
  prettier \
  stylua \
  lua-language-server \
  ngserver \
  vtsls \
  tsp \
  tsp-server \
  tree-sitter \
  vscode-json-language-server \
  yaml-language-server \
  docker-langserver \
  docker-compose-langserver \
  k3d \
  kubectl \
  k9s \
  helm \
  kustomize \
  lazydocker \
  lazygit \
  tilt
do
  show_path "$tool"
done

section js-debug-adapter
printf 'JS_DEBUG_ADAPTER: %s\n' "${JS_DEBUG_ADAPTER:-unset}"
if [ -f "${JS_DEBUG_ADAPTER:-}" ]; then
  echo 'adapter file: OK'
else
  echo 'adapter file: MISSING'
fi
'''

[tasks.nvim-startuptime]
description = "Measure Neovim startup time"
run = '''
set -eu

log="${NVIM_STARTUPTIME_LOG:-/tmp/nvim-startup.log}"
nvim --startuptime "$log" +qa
printf 'Neovim startup log: %s\n' "$log"
'''
