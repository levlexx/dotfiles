##### =========================================================
##### tmux — capsule style / Tokyo Night / Ghostty / macOS
##### with git + icons
##### =========================================================

##### ----- Terminal / rendering -----
set -g default-terminal "tmux-256color"
set -g terminal-features[3] "xterm-256color:RGB"
set -g terminal-features[4] "xterm-ghostty:RGB"
set -g allow-passthrough on
set -sg escape-time 0
set -g focus-events on
set -g extended-keys on
set -g set-clipboard on

##### ----- General -----
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g repeat-time 300
set -g display-time 2000

##### ----- Prefix -----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### ----- Reload -----
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

##### ----- Splits -----
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### ----- Pane navigation -----
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### ----- Pane resize -----
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### ----- Windows / panes -----
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind Tab last-window
bind x kill-pane
bind X kill-window
bind m resize-pane -Z
bind Space next-layout

##### ----- Copy mode / vi -----
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind ] run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"

##### ----- Messages -----
set -g message-style "bg=#292e42,fg=#c0caf5"
set -g message-command-style "bg=#292e42,fg=#7aa2f7"

##### ----- Pane borders -----
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

##### ----- Status base -----
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 30
set -g status-left-length 30
set -g status-right-length 150
set -g status-style "bg=default,fg=#a9b1d6"

##### ----- Auto rename -----
setw -g automatic-rename on
set -g automatic-rename-format "#{?#{==:#{pane_current_command},nvim}, nvim,#{?#{==:#{pane_current_command},vim}, vim,#{?#{==:#{pane_current_command},zsh}, zsh,#{?#{==:#{pane_current_command},bash}, bash,#{?#{==:#{pane_current_command},fish}, fish,#{b:pane_current_path}}}}}}"

##### ----- Left capsule -----
set -g status-left "#[fg=#7aa2f7,bg=default]#[fg=#1a1b26,bg=#7aa2f7,bold]#S#[fg=#7aa2f7,bg=default] "

##### ----- Window capsules -----
setw -g window-status-separator ""
setw -g window-status-style "bg=default,fg=#565f89"

# inactive
setw -g window-status-format "#[fg=#292e42,bg=default]#[fg=#7aa2f7,bg=#292e42]#I #[fg=#c0caf5,bg=#292e42]#W#[fg=#292e42,bg=default] "

# active
setw -g window-status-current-style ""
setw -g window-status-current-format "#[fg=#7aa2f7,bg=default]#[fg=#1a1b26,bg=#7aa2f7,bold]#I #[fg=#1a1b26,bg=#7aa2f7,bold]#W#[fg=#7aa2f7,bg=default] "

setw -g window-status-last-style "fg=#a9b1d6"
setw -g window-status-bell-style "bg=#f7768e,fg=#1a1b26,bold"
setw -g window-status-activity-style "fg=#e0af68"

##### ----- Right side -----
# mode/prefix indicators + time capsule
set -g status-right "#{?pane_in_mode,#[fg=#e0af68,bg=default]#[fg=#1a1b26,bg=#e0af68,bold]COPY#[fg=#e0af68,bg=default] ,}#{?client_prefix,#[fg=#f7768e,bg=default]#[fg=#1a1b26,bg=#f7768e,bold]PREFIX#[fg=#f7768e,bg=default] ,}#[fg=#292e42,bg=default]#[fg=#7aa2f7,bg=#292e42,bold]%H:%M#[fg=#292e42,bg=default]"

##### ----- Clock -----
setw -g clock-mode-colour "#7aa2f7"

##### ----- Plugins (TPM) -----
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

##### ----- Plugin settings -----
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.tmux/plugins/tpm/tpm'
